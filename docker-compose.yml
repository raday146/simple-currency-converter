services:
  backend:
    build:
      context: ./backend
    environment:
      PORT: 3000
      EXTERNAL_API_URL: ${EXTERNAL_API_URL:-https://open.er-api.com/v6/latest/USD}
    ports:
      - '3000:3000'
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
    ports:
      - '8080:80'
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
